services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: metricservice
      POSTGRES_USER: metricservice
      POSTGRES_PASSWORD: metricservice
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metricservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  metricservice:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__Timescale: "Host=timescaledb;Port=5432;Database=metricservice;Username=metricservice;Password=metricservice"
      Loki__BaseUrl: "http://loki:3100"
    ports:
      - "8081:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      loki:
        condition: service_started

volumes:
  timescale-data:
  loki-data:
