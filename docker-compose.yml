services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: metricservice
      POSTGRES_USER: metricservice
      POSTGRES_PASSWORD: metricservice
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metricservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: 1
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./migrations-clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  metricservice:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__Timescale: "Host=timescaledb;Port=5432;Database=metricservice;Username=metricservice;Password=metricservice"
      ConnectionStrings__ClickHouse: "Host=clickhouse;Port=8123;Username=default;Password=;Database=default"
    ports:
      - "8081:8080"
      - "8082:8082"
    depends_on:
      timescaledb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  timescale-data:
  clickhouse-data:
